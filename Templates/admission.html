<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admission - Green Valley School</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='assets/green valley school.jpg') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <header class="bg-success text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h3 mb-0 d-flex align-items-center gap-2">
        <img src="{{ url_for('static', filename='assets/green valley school.jpg') }}" alt="Green Valley School logo" class="site-logo">
        <span>Green Valley School</span>
      </h1>
      <nav>
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('index') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('aboutus') }}">About</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('academics') }}">Academics</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('login') }}">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="py-5">
    <div class="container mt-4 mb-5" style="max-width:720px;">
      <h2 class="text-center mb-4">Admission Form</h2>

      <form onsubmit="return admissionMessage()">

        <div class="mb-3">
          <label for="student_name" class="form-label">Student Full Name</label>
          <input id="student_name" name="student_name" type="text" class="form-control" placeholder="Enter full name" required>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" required>
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Class Applying For</label>
          <select class="form-select" required>
            <option value="">Select Class</option>
            <option>Nursery</option>
            <option>LKG</option>
            <option>UKG</option>
            <option>Grade 1 - 10</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Parent/Guardian Name</label>
          <input type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Contact Number</label>
          <input type="tel" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Home Address</label>
          <textarea class="form-control" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Submit Application</button>

      </form>
    </div>
  </main>

  <script>
    function admissionMessage() {
      alert("Admission Form Submitted Successfully!");
      return false;
    }
  </script>

  <footer class="py-4 bg-dark text-white text-center">
    <p class="mb-0">&copy; 2026 Green Valley School | All Rights Reserved</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
