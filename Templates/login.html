<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Green Valley School</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='assets/green valley school.jpg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

  <div class="container d-flex justify-content-center">
    <div class="login-container row g-0">
      
      <div class="col-md-6 login-image d-none d-md-flex">
        <h2 class="fw-bold">Welcome Back!</h2>
        <p>Access your teacher dashboard, class records, and school updates.</p>
        <a href="{{ url_for('index') }}" class="text-white mt-4"><i class="bi bi-arrow-left"></i> Back to Home</a>
      </div>

      <div class="col-md-6 p-5">
        <div class="text-center mb-4">
          <h3 class="fw-bold text-success">Teacher Portal</h3>
          <p class="text-muted">Enter your credentials to login</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
          {{ form.hidden_tag() }}

          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-success"></i></span>
              <input type="email" name="email" class="form-control border-start-0" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-success"></i></span>
              <input type="password" name="password" class="form-control border-start-0" placeholder="Enter your password" minlength="6" required>
            </div>
          </div>

          <div class="d-flex justify-content-between mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label small" for="remember">Remember me</label>
            </div>
            <a href="#" class="small text-success text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Login to Teacher Dashboard</button>
        </form>

        <div class="text-center mt-4">
          <p class="small text-muted">Trouble logging in? <a href="{{ url_for('index') }}#contact" class="text-success fw-bold">Contact Admin</a></p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
